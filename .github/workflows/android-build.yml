name: Android build

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK (API 34 + NDK)
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125
            cmake;3.22.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          cp app/build/outputs/apk/release/app-release.apk "sdr-driver-$SHORT_SHA.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdr-driver-${{ env.SHORT_SHA }}
          path: sdr-driver-${{ env.SHORT_SHA }}.apk
          if-no-files-found: error

      - name: Delete old release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ci-${{ github.ref_name }}"
          gh release delete "$TAG" -y || true

      - name: Create new release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.ref_name }}
          name: CI build (${{ github.ref_name }})
          files: sdr-driver-${{ env.SHORT_SHA }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
